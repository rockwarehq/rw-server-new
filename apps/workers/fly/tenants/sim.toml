app = 'sim-workers'

# Fly secrets (set via flyctl secrets set -a sim-workers):
# - DATABASE_URL           (pooled, port 6432) — processor + processor-consumer
# - DATABASE_URL_ROLLUPS   (direct,  port 5432) — rollups only; long CTE queries
#                           bypass pgbouncer to avoid tx-mode connection-hold
# - DATABASE_URL_MIGRATION (direct,  port 5432) — used by [deploy] release_command
#                           (can be same value as DATABASE_URL_ROLLUPS)
# - REDIS_URL
# - PROCESSOR_SHARED_SECRET (must match sim-api's value — HMAC for processor → api)
# - MQTT_PASSWORD (broker URL + username are non-sensitive, in [env] below)
[_meta]
required_secrets = [
  'DATABASE_URL',
  'DATABASE_URL_ROLLUPS',
  'DATABASE_URL_MIGRATION',
  'REDIS_URL',
  'PROCESSOR_SHARED_SECRET',
  'MQTT_PASSWORD',
]

[env]
LOG_LEVEL = 'debug'

# processor → api RPC (triggerEvent / listEventsForProcessor / getTagSnapshots).
# Use fly's private 6PN DNS for IPv6 cross-app traffic; NO trailing /rpc — the
# client wrapper appends /rpc itself.
STATION_EVENTS_ENABLED = 'true'
STATION_EVENTS_URL = 'http://sim-api.internal:3000'

# MQTT ingest (processor mode only). Sim's broker on fly.
MQTT_BROKER_URL = 'mqtts://sim-mqtt.fly.dev:443'
MQTT_USERNAME = 'gateway'
MQTT_TOPIC = '#'

# Downstream processors. WORKSPACE_HTTP_EVENTS forwards every parsed point
# value to the api for general processing (NOT the same path as station-events).
WORKSPACE_HTTP_EVENTS_ENABLED = 'true'
WORKSPACE_HTTP_EVENTS_URL = 'http://sim-api.internal:3000'
# DB_EVENTS persists raw point values. The new monorepo uses the shared
# Prisma pool (no separate DB_EVENTS_CONNECTION_STRING). Off by default —
# flip to 'true' once you want point-value persistence in sim.
DB_EVENTS_ENABLED = 'false'
POINTS_SPLIT_ENRICH_ENABLED = 'true'

# Cache-refresh server defaults to port 9465 which collides with the healthz
# host server. Disabled until we expose 9468 in [[services]] + set
# STATION_EVENTS_CACHE_REFRESH_PORT='9468' + set PROCESSOR_CACHE_REFRESH_URL
# on sim-api pointing to http://sim-workers.internal:9468/internal/cache/refresh.
STATION_EVENTS_CACHE_REFRESH_ENABLED = 'false'
