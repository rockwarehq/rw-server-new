app = 'sim-api'

# Fly secrets (set via flyctl secrets set -a sim-api):
# - DATABASE_URL (pooled endpoint — port 6432 if PSDB / pgbouncer)
# - DATABASE_URL_MIGRATION (direct endpoint — port 5432) — used by [deploy] release_command
# - REDIS_URL, JWT_SECRET, RESEND_API_KEY, PROCESSOR_SHARED_SECRET
# - MQTT_GATEWAY_REALY_URL, MQTT_GATEWAY_REALY_USER, MQTT_GATEWAY_REALY_PASSWORD
# - AWS_* + BUCKET_NAME (if S3 uploads enabled)
[_meta]
required_secrets = [
  'DATABASE_URL',
  'DATABASE_URL_MIGRATION',
  'REDIS_URL',
  'JWT_SECRET',
  'RESEND_API_KEY',
  'PROCESSOR_SHARED_SECRET',
  'MQTT_GATEWAY_REALY_URL',
  'MQTT_GATEWAY_REALY_USER',
  'MQTT_GATEWAY_REALY_PASSWORD',
]
domain = 'sim-api.rockware.io'

[env]
LOG_LEVEL = 'debug'
APP_BASE_URL = 'https://sim.rockware.io'
BUCKET_NAME = 'rw-sim'
# DEV_CYCLE_SIMULATOR is local-dev only. On fly, cycles ALWAYS come from
# workers/processor (MQTT ingest). Do not set DEV_CYCLE_SIMULATOR here.

[[http_service.checks]]
interval = '10s'
timeout = '2s'
grace_period = '30s'
method = 'GET'
path = '/health'
